<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PX 가계부</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f0f2f5; color: #222; }
  .container { max-width: 480px; margin: 0 auto; padding: 16px; }
  header { background: #2d5a27; color: #fff; padding: 16px; text-align: center; }
  header h1 { font-size: 1.3rem; }
  header p { font-size: 0.8rem; opacity: 0.85; margin-top: 4px; }
  .card { background: #fff; border-radius: 12px; padding: 16px; margin-top: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  input, button { font-size: 1rem; }
  input { width: 100%; padding: 11px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 8px; }
  button { cursor: pointer; border: none; border-radius: 8px; padding: 11px 16px; }
  .btn-primary { background: #2d5a27; color: #fff; width: 100%; }
  .btn-secondary { background: #eee; color: #444; width: 100%; margin-top: 6px; }
  .btn-danger { background: #d32f2f; color: #fff; width: 100%; margin-top: 6px; }
  .btn-link { background: none; color: #2d5a27; text-decoration: underline; padding: 8px; width: 100%; }
  .hidden { display: none; }
  .summary { display: flex; justify-content: space-between; text-align: center; }
  .summary div { flex: 1; }
  .summary .label { font-size: 0.75rem; color: #888; }
  .summary .value { font-size: 1.05rem; font-weight: 700; margin-top: 2px; }
  .income { color: #1976d2; }
  .expense { color: #d32f2f; }
  .product { display: flex; justify-content: space-between; align-items: center; padding: 10px 4px; border-bottom: 1px solid #eee; }
  .product:last-child { border-bottom: none; }
  .product .name { font-size: 0.95rem; }
  .product .cat { font-size: 0.72rem; color: #999; }
  .product .buy { background: #2d5a27; color: #fff; padding: 7px 12px; font-size: 0.85rem; white-space: nowrap; }
  .tx { display: flex; justify-content: space-between; align-items: center; padding: 9px 4px; border-bottom: 1px solid #eee; }
  .tx:last-child { border-bottom: none; }
  .tx .date { font-size: 0.72rem; color: #999; }
  .tx .del { background: none; color: #bbb; font-size: 1.1rem; padding: 4px 8px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
  .toast.error { background: #c62828; }
  h2 { font-size: 1rem; margin-bottom: 10px; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
  .topbar span { font-size: 0.9rem; }
  .topbar button { background: none; color: #888; font-size: 0.85rem; text-decoration: underline; padding: 4px; }
  .empty { color: #aaa; text-align: center; padding: 16px; font-size: 0.9rem; }
  .otp-badge { display: inline-block; background: #e8f5e9; color: #2d5a27; border-radius: 12px; padding: 2px 10px; font-size: 0.75rem; margin-left: 6px; }
  .otp-badge.off { background: #fce4ec; color: #c62828; }
  .qr-box { background: #f9f9f9; border-radius: 8px; padding: 12px; margin: 10px 0; word-break: break-all; font-size: 0.8rem; color: #555; }
  .info { font-size: 0.82rem; color: #666; margin-bottom: 8px; line-height: 1.5; }
</style>
</head>
<body>
<header>
  <h1>🪖 PX 가계부</h1>
  <p>PX 물건을 검색하고 클릭 한 번으로 지출 기록</p>
</header>
<div class="container">

  <!-- 로그인 / 회원가입 -->
  <div id="auth-section" class="card">
    <h2 id="auth-title">로그인</h2>
    <input id="email" type="email" placeholder="이메일">
    <input id="username" type="text" placeholder="닉네임" class="hidden">
    <input id="password" type="password" placeholder="비밀번호 (영문+숫자 8자 이상)">
    <div id="otp-login-field" class="hidden">
      <input id="otp-login-code" type="text" placeholder="OTP 코드 (앱의 6자리 숫자)" maxlength="6" inputmode="numeric">
    </div>
    <button class="btn-primary" onclick="submitAuth()" id="auth-btn">로그인</button>
    <button class="btn-link" onclick="toggleAuth()" id="auth-toggle">처음이세요? 회원가입</button>
  </div>

  <!-- 메인 화면 -->
  <div id="main-section" class="hidden">
    <div class="topbar">
      <span id="welcome"></span>
      <button onclick="logout()">로그아웃</button>
    </div>

    <div class="card">
      <h2 id="summary-title">이번 달 요약</h2>
      <div class="summary">
        <div><div class="label">수입</div><div class="value income" id="sum-income">0원</div></div>
        <div><div class="label">지출</div><div class="value expense" id="sum-expense">0원</div></div>
        <div><div class="label">잔액</div><div class="value" id="sum-balance">0원</div></div>
      </div>
    </div>

    <div class="card">
      <h2>🔍 PX 상품 검색</h2>
      <input id="search" type="text" placeholder="예: 몽쉘, 불닭, 메로나..." oninput="searchProducts()">
      <div id="products"></div>
    </div>

    <div class="card">
      <h2>최근 지출 내역</h2>
      <div id="transactions"></div>
    </div>

    <!-- 보안 설정 -->
    <div class="card">
      <h2>🔒 보안 설정</h2>
      <div id="otp-status-area"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = '';
let token = localStorage.getItem('token');
let refreshToken = localStorage.getItem('refreshToken');
let otpEnabled = false;
let isRegister = false;

// ---------- 공통 ----------
function fmt(n) { return Number(n).toLocaleString('ko-KR') + '원'; }
function toast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '') + ' show';
  setTimeout(() => t.className = 'toast', 2200);
}
async function api(path, options = {}) {
  options.headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
  if (token) options.headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + path, options);

  // 액세스 토큰 만료 시 자동 갱신
  if (res.status === 401 && refreshToken && !path.includes('/auth/')) {
    const ok = await tryRefresh();
    if (ok) {
      options.headers['Authorization'] = 'Bearer ' + token;
      const res2 = await fetch(API + path, options);
      if (!res2.ok) throw new Error('요청 실패');
      return res2.status === 204 ? null : res2.json();
    } else { logout(); throw new Error('로그인이 만료됐습니다'); }
  }
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || '요청 실패');
  }
  return res.status === 204 ? null : res.json();
}
async function tryRefresh() {
  try {
    const data = await fetch(API + '/auth/refresh?refresh_token=' + encodeURIComponent(refreshToken), { method: 'POST' }).then(r => r.ok ? r.json() : null);
    if (!data) return false;
    token = data.access_token;
    refreshToken = data.refresh_token;
    localStorage.setItem('token', token);
    localStorage.setItem('refreshToken', refreshToken);
    return true;
  } catch { return false; }
}

// ---------- 인증 ----------
function toggleAuth() {
  isRegister = !isRegister;
  document.getElementById('auth-title').textContent = isRegister ? '회원가입' : '로그인';
  document.getElementById('auth-btn').textContent = isRegister ? '가입하기' : '로그인';
  document.getElementById('auth-toggle').textContent = isRegister ? '이미 계정이 있어요' : '처음이세요? 회원가입';
  document.getElementById('username').classList.toggle('hidden', !isRegister);
  if (isRegister) document.getElementById('otp-login-field').classList.add('hidden');
}
async function submitAuth() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const username = document.getElementById('username').value.trim();
  const otpCode = document.getElementById('otp-login-code').value.trim();
  try {
    if (isRegister) {
      await api('/auth/register', { method: 'POST', body: JSON.stringify({ email, username, password }) });
      toast('가입 완료! 자동 로그인합니다');
    }
    const body = { email, password };
    if (otpCode) body.otp_code = otpCode;
    const data = await api('/auth/login', { method: 'POST', body: JSON.stringify(body) });
    token = data.access_token;
    refreshToken = data.refresh_token;
    localStorage.setItem('token', token);
    localStorage.setItem('refreshToken', refreshToken);
    enterMain();
  } catch (e) {
    const msg = e.message;
    // OTP 필요 안내
    if (msg.includes('OTP 코드가 필요')) {
      document.getElementById('otp-login-field').classList.remove('hidden');
      document.getElementById('otp-login-code').focus();
      toast('OTP 코드를 입력해 주세요', true);
    } else {
      toast(msg, true);
    }
  }
}
function logout() {
  token = null; refreshToken = null;
  localStorage.removeItem('token');
  localStorage.removeItem('refreshToken');
  document.getElementById('auth-section').classList.remove('hidden');
  document.getElementById('main-section').classList.add('hidden');
  document.getElementById('otp-login-field').classList.add('hidden');
  document.getElementById('otp-login-code').value = '';
}

// ---------- 메인 ----------
async function enterMain() {
  try {
    const me = await api('/users/me');
    otpEnabled = me.otp_enabled;
    document.getElementById('welcome').textContent = me.username + '님';
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('main-section').classList.remove('hidden');
    refresh();
    renderOtpStatus();
  } catch (e) { /* 토큰 만료 → 로그인 화면 유지 */ }
}
async function refresh() {
  const now = new Date();
  document.getElementById('summary-title').textContent = (now.getMonth() + 1) + '월 요약';
  const [summary, txs] = await Promise.all([
    api(`/transactions/summary?year=${now.getFullYear()}&month=${now.getMonth() + 1}`),
    api('/transactions?limit=15'),
  ]);
  document.getElementById('sum-income').textContent = fmt(summary.total_income);
  document.getElementById('sum-expense').textContent = fmt(summary.total_expense);
  document.getElementById('sum-balance').textContent = fmt(summary.balance);
  renderTransactions(txs);
}
function renderTransactions(txs) {
  const el = document.getElementById('transactions');
  if (!txs.length) { el.innerHTML = '<div class="empty">아직 기록이 없어요. 위에서 상품을 검색해 보세요!</div>'; return; }
  el.innerHTML = txs.map(t => `
    <div class="tx">
      <div>
        <div>${t.title}</div>
        <div class="date">${t.transaction_date} · ${t.category}</div>
      </div>
      <div>
        <span class="${t.type === 'income' ? 'income' : 'expense'}">${t.type === 'income' ? '+' : '-'}${fmt(t.amount)}</span>
        <button class="del" onclick="deleteTx(${t.id})">×</button>
      </div>
    </div>`).join('');
}
async function deleteTx(id) {
  await api('/transactions/' + id, { method: 'DELETE' });
  toast('삭제했습니다');
  refresh();
}

// ---------- 상품 검색 ----------
let searchTimer;
function searchProducts() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(async () => {
    const q = document.getElementById('search').value.trim();
    if (!q) { document.getElementById('products').innerHTML = ''; return; }
    const items = await api('/products?q=' + encodeURIComponent(q));
    const el = document.getElementById('products');
    if (!items.length) { el.innerHTML = '<div class="empty">검색 결과가 없어요</div>'; return; }
    el.innerHTML = items.map(p => `
      <div class="product">
        <div>
          <div class="name">${p.name}</div>
          <div class="cat">${p.category}</div>
        </div>
        <button class="buy" onclick="buy('${p.name.replace(/'/g, "\\'")}', ${p.price}, '${p.category}')">${fmt(p.price)} 기록</button>
      </div>`).join('');
  }, 250);
}
async function buy(name, price, category) {
  const today = new Date().toISOString().slice(0, 10);
  await api('/transactions', {
    method: 'POST',
    body: JSON.stringify({ title: name, amount: price, type: 'expense', category, transaction_date: today }),
  });
  toast(`${name} ${fmt(price)} 기록 완료!`);
  refresh();
}

// ---------- OTP 설정 ----------
function renderOtpStatus() {
  const el = document.getElementById('otp-status-area');
  if (otpEnabled) {
    el.innerHTML = `
      <p class="info">2단계 인증(OTP)이 <strong>활성화</strong>되어 있습니다. 로그인 시 앱의 OTP 코드가 필요합니다.</p>
      <span class="otp-badge">OTP 켜짐</span>
      <br><br>
      <p class="info">비활성화하려면 현재 OTP 코드를 입력하세요:</p>
      <input id="otp-disable-code" type="text" placeholder="6자리 OTP 코드" maxlength="6" inputmode="numeric">
      <button class="btn-danger" onclick="disableOtp()">OTP 비활성화</button>`;
  } else {
    el.innerHTML = `
      <p class="info">2단계 인증(OTP)이 <strong>꺼져</strong> 있습니다. Google Authenticator 등 앱으로 활성화하면 계정 보안이 크게 강화됩니다.</p>
      <span class="otp-badge off">OTP 꺼짐</span>
      <br><br>
      <button class="btn-secondary" onclick="setupOtp()">OTP 설정 시작</button>
      <div id="otp-setup-area"></div>`;
  }
}
async function setupOtp() {
  try {
    const data = await api('/auth/otp/setup', { method: 'POST' });
    document.getElementById('otp-setup-area').innerHTML = `
      <div class="qr-box">
        <strong>1. 아래 주소를 Google Authenticator 앱에서 "설정 키 입력"으로 추가하세요:</strong><br><br>
        시크릿 키: <strong>${data.secret}</strong><br><br>
        <strong>2. 또는 QR URI를 복사해서 앱에 붙여넣기:</strong><br>
        <small>${data.qr_uri}</small>
      </div>
      <p class="info">앱에 추가 후, 앱에 표시된 6자리 코드를 입력하면 OTP가 활성화됩니다.</p>
      <input id="otp-verify-code" type="text" placeholder="앱의 6자리 코드 입력" maxlength="6" inputmode="numeric">
      <button class="btn-primary" onclick="verifyOtp()">OTP 활성화</button>`;
  } catch (e) { toast(e.message, true); }
}
async function verifyOtp() {
  const code = document.getElementById('otp-verify-code').value.trim();
  try {
    await api('/auth/otp/verify', { method: 'POST', body: JSON.stringify({ code }) });
    otpEnabled = true;
    toast('OTP가 활성화됐습니다! 다음 로그인부터 앱 코드가 필요합니다.');
    renderOtpStatus();
  } catch (e) { toast(e.message, true); }
}
async function disableOtp() {
  const code = document.getElementById('otp-disable-code').value.trim();
  try {
    await api('/auth/otp/disable', { method: 'DELETE', body: JSON.stringify({ code }) });
    otpEnabled = false;
    toast('OTP가 비활성화됐습니다.');
    renderOtpStatus();
  } catch (e) { toast(e.message, true); }
}

// 시작
if (token) enterMain();
</script>
</body>
</html>
